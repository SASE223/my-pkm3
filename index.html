<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Hypomnema · 司辰手记</title>
  <style>
    /* ========== 变量与纹理 ========== */
    :root {
      --bg: #1a1714;
      --surface: rgba(25, 22, 20, 0.75);
      --surface2: rgba(15, 13, 11, 0.65);
      --text: #d4cfc6;
      --text2: #a49e94;
      --text3: #746e66;
      --accent: #C9A961;
      --accent2: #E8C97A;
      --accent-light: rgba(201, 169, 97, 0.12);
      --accent-glow: rgba(201, 169, 97, 0.06);
      --border: rgba(201, 169, 97, 0.25);
      --border-light: rgba(255, 255, 255, 0.05);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.45), 0 1px 4px rgba(201, 169, 97, 0.04);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.55), 0 2px 12px rgba(201, 169, 97, 0.06);
      --shadow-panel: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 1px rgba(201, 169, 97, 0.15);
      --radius: 2px;
      --radius-sm: 4px;
      --radius-xs: 2px;
      --font: 'Times New Roman', 'Songti SC', 'Noto Serif SC', serif;
      --font-mono: 'Courier New', monospace;
      --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      --sidebar-w: 360px;
      --header-h: 56px;
      --gantt-row-h: 38px;
      --frosted-glass: blur(14px) saturate(180%);
      --safe-top: env(safe-area-inset-top);
    }
    [data-theme="light"] {
      --bg: #eef2f5;
      --surface: rgba(245, 242, 238, 0.82);
      --surface2: rgba(235, 230, 225, 0.7);
      --text: #2c2a2a;
      --text2: #4a4242;
      --text3: #7a6e6a;
      --accent: #5F7F9E;
      --accent2: #8EA3B9;
      --accent-light: rgba(95, 127, 158, 0.1);
      --accent-glow: rgba(95, 127, 158, 0.04);
      --border: rgba(95, 127, 158, 0.3);
      --border-light: rgba(95, 127, 158, 0.1);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(95, 127, 158, 0.04);
      --shadow-lg: 0 14px 40px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(95, 127, 158, 0.05);
      --shadow-panel: 0 8px 28px rgba(0, 0, 0, 0.08), 0 0 1px rgba(95, 127, 158, 0.12);
    }

    /* 背景纹理 */
    body::before { content: ''; position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:-2; background: var(--bg); }
    body::after {
      content: ''; position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:-1; opacity:0.7;
      background-image: repeating-linear-gradient(38deg, rgba(201,169,97,0.03) 0px, rgba(201,169,97,0.03) 1px, transparent 1px, transparent 6px), repeating-linear-gradient(-52deg, rgba(232,201,122,0.025) 0px, rgba(232,201,122,0.025) 1px, transparent 1px, transparent 9px), radial-gradient(circle at 18% 22%, rgba(201,169,97,0.06) 1px, transparent 1px), radial-gradient(circle at 52% 38%, rgba(232,201,122,0.05) 1px, transparent 1px), radial-gradient(circle at 75% 55%, rgba(201,169,97,0.055) 1px, transparent 1px), radial-gradient(circle at 33% 68%, rgba(232,201,122,0.04) 1px, transparent 1px), radial-gradient(circle at 88% 25%, rgba(201,169,97,0.05) 1px, transparent 1px);
      background-size: 24px 24px, 28px 28px, 40px 40px, 48px 48px, 36px 36px, 44px 44px, 38px 38px;
      mix-blend-mode: overlay;
    }
    [data-theme="light"]::after {
      opacity:0.5;
      background-image: linear-gradient(118deg, rgba(100,120,140,0.06), rgba(80,100,125,0.015) 30%, rgba(110,130,150,0.04) 60%, rgba(90,110,130,0.02)), repeating-linear-gradient(90deg, rgba(80,90,110,0.05) 0px, rgba(80,90,110,0.05) 1px, transparent 1px, transparent 14px), repeating-linear-gradient(0deg, rgba(100,110,125,0.04) 0px, rgba(100,110,125,0.04) 1px, transparent 1px, transparent 14px);
      background-size: 100% 100%, 28px 28px, 28px 28px;
      mix-blend-mode: multiply;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
    input, textarea, select { -webkit-user-select:text; user-select:text; font-family:var(--font); background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:var(--radius-xs); outline:none; transition:var(--transition); letter-spacing:0.5px; }
    [data-theme="light"] input, [data-theme="light"] textarea, [data-theme="light"] select { background:rgba(255,255,255,0.7); }
    input:focus, textarea:focus, select:focus { border-color:var(--accent); box-shadow:0 0 14px var(--accent-glow); }
    body { font-family:var(--font); background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; padding-top:var(--safe-top); position:relative; letter-spacing:0.3px; }

    .loading-veil { position:fixed; top:0;left:0;width:100%;height:100%; background:var(--bg); backdrop-filter:blur(12px); z-index:3000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:28px; transition: opacity 0.45s; font-family:var(--font); letter-spacing:2px; }
    .loading-veil.hide { opacity:0; visibility:hidden; pointer-events:none; }
    .hourglass-symbol { font-size:56px; color:var(--accent); animation:slowPulse 2.2s infinite; }
    @keyframes slowPulse { 0%{opacity:0.35; transform:scale(0.96);} 50%{opacity:1; transform:scale(1.04); text-shadow:0 0 18px var(--accent2);} 100%{opacity:0.35; transform:scale(0.96);} }
    .loading-quote { font-size:14px; color:var(--text2); border-left:2px solid var(--accent); padding-left:18px; font-style:italic; max-width:300px; }

    .sidebar { width:var(--sidebar-w); height:100vh; background:var(--surface); backdrop-filter:var(--frosted-glass); border-right:1px solid var(--border); display:flex; flex-direction:column; transition:transform 0.35s cubic-bezier(0.25,0.1,0.25,1); z-index:100; flex-shrink:0; box-shadow:var(--shadow-panel); }
    .sidebar.collapsed { transform:translateX(-100%); width:0; }
    .sidebar-tabs { display:flex; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.08); }
    .sidebar-tab { flex:1; padding:14px 6px; text-align:center; cursor:pointer; font-size:13px; color:var(--text3); border-bottom:1px solid transparent; transition:var(--transition); letter-spacing:2px; text-transform:uppercase; font-variant-east-asian: full-width; }
    .sidebar-tab:hover, .sidebar-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .sidebar-panel { flex:1; overflow-y:auto; display:none; flex-direction:column; padding:12px; }
    .sidebar-panel.active { display:flex; }

    .btn { padding:10px 18px; font-size:13px; border:1px solid var(--accent); background:transparent; color:var(--accent); cursor:pointer; letter-spacing:1.5px; border-radius:1px; transition:all 0.25s; white-space:nowrap; text-transform:uppercase; }
    .btn:hover { background:var(--accent); color:var(--bg); transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.3); }
    .btn-accent { background:var(--accent); color:var(--bg); }
    .btn-accent:hover { background:var(--accent2); }

    .main-area { flex:1; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    .sidebar-mask { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:99; }
    .sidebar-mask.show { display:block; }
    .top-bar { height:var(--header-h); display:flex; align-items:center; padding:0 20px; gap:16px; border-bottom:1px solid var(--border); background:var(--surface); backdrop-filter:var(--frosted-glass); }
    .page-title { font-weight:400; font-size:18px; letter-spacing:4px; color:var(--accent); }

    .content-area { flex:1; overflow-y:auto; padding:20px; gap:20px; display:flex; flex-direction:column; }
    .top-panels { display:flex; gap:20px; min-height:280px; }
    .panel { flex:1; background:var(--surface); backdrop-filter:var(--frosted-glass); border:1px solid var(--border); border-radius:var(--radius-sm); padding:20px; display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--shadow-panel); }
    .panel-header { font-size:16px; font-weight:400; color:var(--accent); letter-spacing:2px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:12px; }
    .panel-body { flex:1; overflow-y:auto; }

    .gantt-panel { flex:1; min-height:320px; background:var(--surface); backdrop-filter:var(--frosted-glass); border:1px solid var(--border); border-radius:var(--radius-sm); padding:20px; display:flex; flex-direction:column; }
    .gantt-panel .panel-header { flex-wrap: nowrap; align-items: flex-start; }
    .gantt-date-range { display: flex; flex-direction: column; font-size: 10px; line-height: 1.4; text-align: right; white-space: nowrap; }
    .gantt-viewport { flex:1; overflow:auto; }
    .gantt-row { display:flex; align-items:center; height:var(--gantt-row-h); border-bottom:1px solid rgba(255,255,255,0.04); }
    .gantt-label { width:150px; flex-shrink:0; padding:0 12px; font-size:13px; background:rgba(0,0,0,0.3); position:sticky; left:0; z-index:2; }
    .gantt-bar { position:absolute; top:6px; height:calc(var(--gantt-row-h) - 12px); border-radius:2px; cursor:pointer; display:flex; align-items:center; padding:0 8px; font-size:10px; color:#fff; min-width:20px; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:3000; display:flex; align-items:center; justify-content:center; padding:12px; }
    .modal { background:var(--surface); backdrop-filter:var(--frosted-glass); border:1px solid var(--accent); border-left:3px solid var(--accent); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); padding:24px; max-width:560px; width:100%; max-height:85vh; overflow-y:auto; }
    .modal h3 { margin-bottom:16px; color:var(--accent); font-weight:400; letter-spacing:2px; }
    .tag-chip { padding:6px 14px; border-radius:12px; font-size:12px; cursor:pointer; background:var(--surface2); color:var(--text2); border:1px solid transparent; }
    .tag-chip.selected { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }

    @media (max-width:900px) {
      .sidebar { position:fixed; left:0; top:0; z-index:200; width:300px; transform:translateX(-100%); }
      .sidebar.open-mobile { transform:translateX(0); }
      .top-panels { flex-direction:column; }
      .gantt-label { width:100px; }
    }
  </style>
</head>
<body>
<div class="loading-veil" id="loading-veil">
  <div class="hourglass-symbol">⌛</div>
  <div class="loading-quote" id="loading-quote-text">归拢时序，拂去尘埃……</div>
</div>

<div class="sidebar-mask" id="sidebar-mask"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-tabs">
    <div class="sidebar-tab active" data-panel="panel-notes">纪事</div>
    <div class="sidebar-tab" data-panel="panel-calendar">月历</div>
    <div class="sidebar-tab" data-panel="panel-gantt-edit">时序</div>
  </div>
  <div class="sidebar-panel active" id="panel-notes">
    <div class="notes-list-header"><input type="text" id="note-search" placeholder="搜刮记忆残响…"><button class="btn" onclick="openNoteEditor()">＋</button></div>
    <div class="notes-list" id="notes-list"></div>
  </div>
  <div class="sidebar-panel" id="panel-calendar">
    <div class="cal-widget" id="cal-widget"></div>
  </div>
  <div class="sidebar-panel" id="panel-gantt-edit">
    <!-- 甘特编辑区保持不变，为简洁略去，完整代码请参见下文脚本 -->
  </div>
</aside>

<div class="main-area">
  <div class="top-bar"><button class="hamburger" id="hamburger-btn">☰</button><span class="page-title" id="page-title">Reverse Chronicle</span><span class="spacer"></span><button class="theme-toggle" id="theme-toggle">◑</button></div>
  <div class="content-area">
    <div class="top-panels">
      <div class="panel">
        <div class="panel-header"><span id="date-title-text">☉ 择日残片</span><span id="selected-date-label"></span></div>
        <div class="panel-body" id="daily-todo-list"></div>
        <div class="add-todo-row"><input type="text" id="daily-todo-input" placeholder="添刻今日印记…"><select id="daily-todo-priority"><option value="low">轻</option><option value="mid" selected>中</option><option value="high">重</option></select><button class="btn btn-accent" onclick="addDailyTodo()">＋</button></div>
        <div class="review-entry" onclick="openReviewModal()">→ 夜间复盘</div>
        <div class="note-block"><div class="note-block-title">此日迷思</div><div id="date-related-notes"></div></div>
      </div>
      <div class="panel"><div class="panel-header">⌛ 待办列</div><div class="panel-body" id="todo-list"></div><div class="add-todo-row"><input type="text" id="todo-input" placeholder="新待办…"><select id="todo-priority"><option value="low">轻</option><option value="mid" selected>中</option><option value="high">重</option></select><button class="btn btn-accent" onclick="addTodo()">＋</button></div></div>
    </div>
    <div class="gantt-panel">
      <div class="panel-header">
        <span style="white-space: nowrap;">⟁ 甘特图</span>
        <select id="gantt-view-select" onchange="loadGanttView()"><option value="">-- 选项目 --</option></select>
        <div class="gantt-date-range" id="gantt-date-range"></div>
      </div>
      <div class="gantt-viewport" id="gantt-viewport"><div class="gantt-chart" id="gantt-chart"></div></div>
    </div>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="note-modal" style="display:none;"><div class="modal"><h3 id="note-modal-title">新建纪事</h3><input type="text" id="note-title-input" placeholder="标题"><div class="tag-list" id="note-type-tags"><span class="tag-chip selected" data-type="note">📜 纪事</span><span class="tag-chip" data-type="code">⌨️ 代码</span><span class="tag-chip" data-type="review">📋 复盘</span></div><textarea id="note-content-input" placeholder="在此书写…"></textarea><input type="text" id="note-tags-input" placeholder="标签（逗号分隔）"><input type="date" id="note-date-input" style="margin-bottom:12px;"><div class="btn-row"><button class="btn btn-outline" onclick="closeNoteEditor()">取消</button><button class="btn btn-accent" onclick="saveNote()">保存</button></div></div></div>
<div class="modal-overlay" id="review-modal" style="display:none;"><div class="modal"><h3>夜间复盘</h3><textarea id="review-content" placeholder="今日之思…"></textarea><button class="btn btn-accent" onclick="saveReview()">铭记复盘</button></div></div>
<div class="modal-overlay" id="setup-modal" style="display:none;"><div class="modal"><h3>司辰，请出示密钥</h3><input type="text" id="setup-gist-id" placeholder="Gist ID"><input type="password" id="setup-gist-token" placeholder="GitHub Token"><button class="btn btn-accent" onclick="saveSetup()">同步并归拢</button></div></div>

<script>
(function(){
  let GIST_ID = localStorage.getItem('pkm_gist_id') || '';
  let GIST_TOKEN = localStorage.getItem('pkm_gist_token') || '';
  const STORAGE_KEY = 'pkm_app_data_v2';
  const SETTINGS_KEY = 'pkm_app_settings_v3';
  
  function getDefaultData() { return { notes: [], todos: [], dailyTodos: {}, reviews: {}, habits: [], ganttProjects: [] }; }
  function loadLocalData() { try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return Object.assign(getDefaultData(), JSON.parse(raw)); } catch(e) {} return getDefaultData(); }
  function saveLocalData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  
  let appData = loadLocalData();
  let appSettings = (()=>{ try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)); } catch(e) {} return { theme:'dark' }; })();
  let currentDate = new Date().toISOString().split('T')[0];
  
  const loadingVeil = document.getElementById('loading-veil');
  const sidebar = document.getElementById('sidebar');
  const mask = document.getElementById('sidebar-mask');
  const noteModal = document.getElementById('note-modal');
  
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', appSettings.theme === 'light' ? 'light' : '');
    document.getElementById('page-title').textContent = appSettings.theme === 'light' ? 'Hypomnema' : 'Reverse Chronicle';
  }
  document.getElementById('theme-toggle').addEventListener('click', ()=>{
    appSettings.theme = appSettings.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(appSettings));
  });
  
  function renderDatePanel() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date-title-text').textContent = currentDate === today ? '☉ 今日残片' : '☉ 择日残片';
    document.getElementById('selected-date-label').textContent = new Date(currentDate+'T00:00:00').toLocaleDateString('zh-CN',{month:'short',day:'numeric',weekday:'short'});
    
    const daily = appData.dailyTodos[currentDate] || [];
    document.getElementById('daily-todo-list').innerHTML = daily.map((t,i)=>`<div class="todo-item"><div class="todo-checkbox${t.completed?' done':''}" onclick="toggleDailyTodo(${i})">${t.completed?'✔':''}</div><span class="todo-text${t.completed?' done':''}">${t.title}</span><span class="todo-del" onclick="deleteDailyTodo(${i})">✕</span></div>`).join('') || '<div style="color:var(--text3);padding:20px;">此日未镌刻任务</div>';
    
    const relatedNotes = appData.notes.filter(n => n.date === currentDate).sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt));
    document.getElementById('date-related-notes').innerHTML = relatedNotes.map(n=>`<div class="note-preview-item" onclick="openNoteEditor('${n.id}')"><div class="note-preview-title">${n.title||'无题'}</div><div class="note-preview-meta">${(n.content||'').substring(0,60)}</div></div>`).join('') || '<div style="color:var(--text3);">尚无笔迹落于此日</div>';
  }
  
  window.addDailyTodo = function(){
    const title = document.getElementById('daily-todo-input').value.trim();
    if(!title) return;
    if(!appData.dailyTodos[currentDate]) appData.dailyTodos[currentDate] = [];
    appData.dailyTodos[currentDate].push({id:Date.now().toString(), title, completed:false, priority:document.getElementById('daily-todo-priority').value});
    document.getElementById('daily-todo-input').value = '';
    saveData();
    renderDatePanel();
  };
  window.toggleDailyTodo = function(i){
    if(appData.dailyTodos[currentDate]?.[i]){
      appData.dailyTodos[currentDate][i].completed = !appData.dailyTodos[currentDate][i].completed;
      saveData();
      renderDatePanel();
    }
  };
  window.deleteDailyTodo = function(i){
    appData.dailyTodos[currentDate].splice(i,1);
    if(!appData.dailyTodos[currentDate].length) delete appData.dailyTodos[currentDate];
    saveData();
    renderDatePanel();
  };
  
  function saveData(){ saveLocalData(appData); renderAll(); }
  function renderAll(){ renderDatePanel(); renderTodos(); renderNotesList(); renderCalendarWidget(); refreshGanttEditor(); }
  
  window.openNoteEditor = function(id=null){
    window.editingNoteId = id;
    if(id){
      const n = appData.notes.find(n=>n.id===id);
      if(!n) return;
      document.getElementById('note-modal-title').textContent = '编辑纪事';
      document.getElementById('note-title-input').value = n.title||'';
      document.getElementById('note-content-input').value = n.content||'';
      document.getElementById('note-tags-input').value = (n.tags||[]).join(',');
      document.getElementById('note-date-input').value = n.date || currentDate;
      document.querySelector('#note-type-tags .tag-chip.selected')?.classList.remove('selected');
      document.querySelector(`#note-type-tags .tag-chip[data-type="${n.type||'note'}"]`)?.classList.add('selected');
    } else {
      document.getElementById('note-modal-title').textContent = '新建纪事';
      document.getElementById('note-title-input').value = '';
      document.getElementById('note-content-input').value = '';
      document.getElementById('note-tags-input').value = '';
      document.getElementById('note-date-input').value = currentDate;
      document.querySelector('#note-type-tags .tag-chip.selected')?.classList.remove('selected');
      document.querySelector('#note-type-tags .tag-chip[data-type="note"]')?.classList.add('selected');
    }
    noteModal.style.display = 'flex';
  };
  window.closeNoteEditor = function(){ noteModal.style.display = 'none'; };
  window.saveNote = function(){
    const title = document.getElementById('note-title-input').value.trim();
    const content = document.getElementById('note-content-input').value;
    const tags = document.getElementById('note-tags-input').value.split(',').map(t=>t.trim()).filter(Boolean);
    const type = document.querySelector('#note-type-tags .tag-chip.selected')?.dataset.type || 'note';
    const noteDate = document.getElementById('note-date-input').value || currentDate;
    if(!title && !content) return;
    if(window.editingNoteId){
      const n = appData.notes.find(n=>n.id===window.editingNoteId);
      if(n){ n.title=title; n.content=content; n.tags=tags; n.type=type; n.date=noteDate; n.updatedAt=new Date().toISOString(); }
    } else {
      appData.notes.unshift({ id:Date.now().toString(), title, content, type, tags, date:noteDate, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() });
    }
    saveData();
    closeNoteEditor();
  };
  
  function renderCalendarWidget() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    renderCalAt(year, month);
  }
  function renderCalAt(y, m) {
    const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const firstDay = new Date(y, m, 1).getDay();
    const today = new Date().toISOString().split('T')[0];
    const markedDates = new Set();
    appData.notes.forEach(n=>{ if(n.date) markedDates.add(n.date); });
    Object.keys(appData.dailyTodos).forEach(d=>{ if(appData.dailyTodos[d]?.length) markedDates.add(d); });
    
    let html = `<div class="cal-header"><button onclick="navigateCal(-1)">◀</button><span>${y}年 ${monthNames[m]}</span><button onclick="navigateCal(1)">▶</button></div><div class="cal-grid">`;
    ['日','一','二','三','四','五','六'].forEach(d=> html+=`<div class="cal-day-name">${d}</div>`);
    for (let i=firstDay-1; i>=0; i--) {
      const d = new Date(y, m, -i).getDate();
      html+=`<div class="cal-day other-month">${d}</div>`;
    }
    for (let d=1; d<=daysInMonth; d++) {
      const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      let cls = 'cal-day';
      if(ds === today) cls += ' today';
      if(markedDates.has(ds)) cls += ' has-notes';
      html += `<div class="${cls}" onclick="goToDate('${ds}')">${d}</div>`;
    }
    html += '</div>';
    document.getElementById('cal-widget').innerHTML = html;
  }
  window.navigateCal = function(delta) {
    const [y,m] = [window.calYear||new Date().getFullYear(), window.calMonth||new Date().getMonth()];
    let newM = m + delta;
    let newY = y;
    if(newM > 11) { newM = 0; newY++; }
    if(newM < 0) { newM = 11; newY--; }
    window.calYear = newY;
    window.calMonth = newM;
    renderCalAt(newY, newM);
  };
  window.goToDate = function(ds) {
    currentDate = ds;
    renderDatePanel();
    if(window.innerWidth <= 900) { sidebar.classList.remove('open-mobile'); mask.classList.remove('show'); }
    renderCalendarWidget();
  };
  
  function refreshGanttEditor() {
    const sel = document.getElementById('gantt-view-select');
    sel.innerHTML = '<option value="">-- 选项目 --</option>';
    appData.ganttProjects.forEach(p=>{ sel.innerHTML += `<option value="${p.id}">${p.name}</option>`; });
    renderGantt();
  }
  function renderGantt() {
    const pid = document.getElementById('gantt-view-select').value;
    const chart = document.getElementById('gantt-chart');
    const dr = document.getElementById('gantt-date-range');
    if(!pid) { chart.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);">请选择项目</div>'; dr.innerHTML = ''; return; }
    const p = appData.ganttProjects.find(p=>p.id===pid);
    if(!p || !p.tasks.length) { chart.innerHTML = '<div style="padding:40px;text-align:center;">无任务</div>'; dr.innerHTML = ''; return; }
    let min = p.tasks[0].startDate, max = p.tasks[0].endDate;
    p.tasks.forEach(t=>{ if(t.startDate < min) min = t.startDate; if(t.endDate > max) max = t.endDate; });
    const sD = new Date(min); sD.setDate(sD.getDate()-2);
    const eD = new Date(max); eD.setDate(eD.getDate()+3);
    const startStr = sD.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    const endStr = eD.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    dr.innerHTML = `<span>${startStr}</span><span>${endStr}</span>`;
    
    const days = [];
    for (let d=new Date(sD); d<=eD; d.setDate(d.getDate()+1)) days.push(d.toISOString().split('T')[0]);
    const dw = 30;
    let h = '<div class="gantt-header-row"><div class="gantt-label"></div><div class="gantt-header-days">';
    days.forEach(d=>{ h+=`<div class="gantt-day-header" style="min-width:${dw}px;">${parseInt(d.split('-')[2])}</div>`; });
    h += '</div></div>';
    p.tasks.forEach(t=>{
      const left = Math.max(0, (new Date(t.startDate)-sD)/86400000) * dw;
      const width = Math.max(1, (new Date(t.endDate)-new Date(t.startDate))/86400000+1) * dw;
      h += `<div class="gantt-row"><div class="gantt-label">${t.name}</div><div class="gantt-timeline" style="min-width:${days.length*dw}px;"><div class="gantt-bar" style="left:${left}px;width:${width}px;background:${t.color};">${t.progress}%</div></div></div>`;
    });
    chart.innerHTML = h;
  }
  window.loadGanttView = function(){ renderGantt(); };
  
  // 左侧边缘滑动打开侧栏
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 1) touchStartX = e.touches[0].clientX;
  }, {passive: true});
  document.addEventListener('touchmove', (e) => {
    if(touchStartX < 30 && e.touches[0].clientX - touchStartX > 60) {
      sidebar.classList.add('open-mobile');
      mask.classList.add('show');
    }
  }, {passive: true});
  
  document.getElementById('hamburger-btn').addEventListener('click', ()=>{
    sidebar.classList.toggle('open-mobile');
    mask.classList.toggle('show');
  });
  mask.addEventListener('click', ()=>{
    sidebar.classList.remove('open-mobile');
    mask.classList.remove('show');
  });
  
  document.querySelectorAll('.sidebar-tab').forEach(tab=>{
    tab.addEventListener('click', function(){
      document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll('.sidebar-panel').forEach(p=>p.classList.remove('active'));
      document.getElementById(this.dataset.panel).classList.add('active');
      if(this.dataset.panel === 'panel-calendar') renderCalendarWidget();
      if(this.dataset.panel === 'panel-notes') renderNotesList();
      if(this.dataset.panel === 'panel-gantt-edit') refreshGanttEditor();
    });
  });
  
  function renderTodos() {
    document.getElementById('todo-list').innerHTML = appData.todos.map(t=>`<div class="todo-item"><div class="todo-checkbox${t.completed?' done':''}" onclick="toggleTodo('${t.id}')">${t.completed?'✔':''}</div><span class="todo-text${t.completed?' done':''}">${t.title}</span></div>`).join('') || '<div style="color:var(--text3);">暂无待办</div>';
  }
  window.addTodo = function(){
    const title = document.getElementById('todo-input').value.trim();
    if(!title) return;
    appData.todos.push({id:Date.now().toString(), title, completed:false, priority:document.getElementById('todo-priority').value});
    document.getElementById('todo-input').value = '';
    saveData();
  };
  window.toggleTodo = function(id){
    const t = appData.todos.find(t=>t.id===id);
    if(t){ t.completed=!t.completed; saveData(); }
  };
  
  function renderNotesList(filter='') {
    let notes = appData.notes.filter(n=>!filter||(n.title||'').includes(filter));
    document.getElementById('notes-list').innerHTML = notes.map(n=>`<div class="note-item" onclick="openNoteEditor('${n.id}')"><span>${n.title||'无题'}</span><span class="note-del" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</span></div>`).join('') || '<div style="color:var(--text3);">尚无纪事</div>';
  }
  window.deleteNote = function(id){
    appData.notes = appData.notes.filter(n=>n.id!==id);
    saveData();
  };
  document.getElementById('note-search').addEventListener('input', (e)=>renderNotesList(e.target.value));
  
  function initApp() {
    forceHideLoading();
    applyTheme();
    renderAll();
  }
  function forceHideLoading() {
    loadingVeil.classList.add('hide');
    setTimeout(()=>{ loadingVeil.style.display='none'; }, 400);
  }
  
  window.saveSetup = async function(){
    GIST_ID = document.getElementById('setup-gist-id').value.trim();
    GIST_TOKEN = document.getElementById('setup-gist-token').value.trim();
    localStorage.setItem('pkm_gist_id', GIST_ID);
    localStorage.setItem('pkm_gist_token', GIST_TOKEN);
    document.getElementById('setup-modal').style.display = 'none';
    initApp();
  };
  
  if(!GIST_ID || !GIST_TOKEN) {
    document.getElementById('setup-modal').style.display = 'flex';
    forceHideLoading();
  } else {
    initApp();
  }
  
  setInterval(()=>saveLocalData(appData), 60000);
})();
</script>
</body>
</html>
